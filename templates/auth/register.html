{% extends 'base.html' %}

{% block title %}Register | PCOS Predict{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h2 class="auth-title"><i class="fa-solid fa-user-plus"></i> Create Account</h2>
        <p class="auth-subtitle">Register a new clinician account to manage diagnostics and patient health data.</p>
        
        <form action="{{ url_for('register') }}" method="POST" onsubmit="return validatePasswords()">
            <div class="form-grid" style="grid-template-columns: 1fr; gap: 1.2rem;">
                <!-- Username -->
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-user input-icon"></i>
                        <input type="text" id="username" name="username" class="form-input" placeholder="Choose a username" required autocomplete="username" style="padding-left: 2.5rem;">
                    </div>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope input-icon"></i>
                        <input type="email" id="email" name="email" class="form-input" placeholder="e.g. doctor@hospital.com" required autocomplete="email" style="padding-left: 2.5rem;">
                    </div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-key input-icon"></i>
                        <input type="password" id="password" name="password" class="form-input" placeholder="Choose a strong password" required autocomplete="new-password" style="padding-left: 2.5rem;">
                    </div>
                </div>

                <!-- Confirm Password -->
                <div class="form-group">
                    <label for="confirm_password" class="form-label">Confirm Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-shield-halved input-icon"></i>
                        <input type="password" id="confirm_password" name="confirm_password" class="form-input" placeholder="Confirm your password" required autocomplete="new-password" style="padding-left: 2.5rem;">
                    </div>
                </div>

                <!-- Validation message -->
                <div id="password-error" style="color: var(--red-dark); font-size: 0.88rem; font-weight: 600; text-align: center;"></div>

                <!-- Submit Button -->
                <button type="submit" class="btn-submit" style="margin-top: 1rem; height: 46px;">
                    <i class="fa-solid fa-user-check"></i> Register Account
                </button>
            </div>
        </form>

        <p class="auth-footer-link">
            Already have an account? <a href="{{ url_for('login') }}">Log in here</a>
        </p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function validatePasswords() {
    const pwd = document.getElementById('password').value;
    const confirm = document.getElementById('confirm_password').value;
    const errDiv = document.getElementById('password-error');
    
    if (pwd !== confirm) {
        errDiv.textContent = "Passwords do not match.";
        return false;
    }
    return true;
}
</script>
{% endblock %}
